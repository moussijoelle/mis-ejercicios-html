<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Convertir números a letras </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-gray-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-slate-500;
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-400 font-mono;
        }
        input,
        label {
          @apply inline-block flex-1 pl-4;
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }
        details {
          @apply mb-4 pb-4 border-b-slate-700 border-b-1;
        }
        summary {
          @apply bg-slate-700 text-white font-bold;
        }
        code {
          @apply text-blue-800;
        }
        ul {
          list-style-type: circle;
          @apply ml-4;
        }
      }
    </style>
  </head>

  <body>
    
    <div
    aria-hidden="true"
    class="fixed top-0 bottom-0 w-1 bg-red-600 z-50 pointer-events-none"
    style="left: max(1rem, calc(50% - 21rem - 0.25rem));"
  ></div>

    <div
    aria-hidden="true"
    class="fixed top-0 bottom-0 w-1 bg-red-600 z-50 pointer-events-none"
    style="right: max(1rem, calc(50% - 21rem - 0.25rem));"
  ></div>


    </div>
    <main
      class="bg-amber-200 min-h-screen w-full max-w-2xl mx-auto flex flex-col justify-start items-center px-4 pt-8 pb-6 sm:px-6 sm:pt-10 md:px-8"
    >
      <h1
        class="text-center text-3xl font-bold text-red-600 sm:text-2xl md:text-3xl">
     💃 ¡A jugar!🕺
      </h1>
      <p class="mt-2 text-center font-semibold text-slate-600 text-xl"  >
    Este juego consiste en convertir números entre 0 y 10 en letras:
      </p>

      <form
        id="formulario-numero"
        class="mt-8 flex w-full max-w-2xl flex-col gap-6 rounded-lg bg-violet-100 p-6"
        action="#"
        method="post"
      >
        <div class="flex flex-row items-center gap-4">
          <label class="shrink-0 text-black" for="numero">
            Introduce un numero 
          </label>
          <input
            id="numero"
            name="numero"
            type="number"
            min="0"
            max="10"
            step="1"
            inputmode="numeric"
            autocomplete="off"
            class="min-w-0 flex-1 rounded-md border-2 border-blue-900 bg-white px-2 py-1 text-black"
          />
        </div>
<div class="flex flex-row items-center gap-4">
        <button
          type="submit"
          class="self-start rounded-md border-2 border-amber-400 bg-gray-200 px-3 py-1 text-black"
        >
           Convertir
        </button>
      </form>

      <p
        id="resultado"
        class="mt-4 w-full max-w-2xl self-start text-left font-medium text-red-600"
        aria-live="polite"
      ></p>

</div>

      <img
        src="img/animo.gif"
        alt="Ilustración al final de la página"
        class="mt-16 w-full max-w-sm self-center rounded-md"
      />
      <p class="mt-10 text-center font-bold text-black">
        ¡Gracias por jugar!🎉
      </p>

    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
