<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto con Tailwind CSS</title>
  <!-- Los <link> de las fuentes se colocan en el HTML dado que es la forma más rápida de carga cuando se usa el CDN. -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-brand: #ff4500;
    }
    @layer base {
      p {
        @apply mb-4 leading-relaxed text-gray-700;
      }

      h1, h2, h3 {
        @apply font-serif font-bold text-gray-900 mb-6;
      }
    }

    @layer components {
      .btn-principal {
        @apply px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition;
      }
    }

    @layer utilities {
      .rotate-45-extra {
        transform: rotate(45deg);
      }
    }

  </style>

</head>

<body class="flex justify-center">
<form class="w-3/4 p-6 m-2 bg-gray-100 ">
    <h1 class="text-pink-800 font-bold text-xl my-2">Gastos de la casa</h1>
    <p class="font-bold">Todo lo que viene del HTML es un string (texto) y hay que convertirlo</p>
    <p class="flex flex-row">
      <label class="text-right pr-8 flex-1" for="nombre">Tu nombre:</label>
      <input class="flex-2" type="text" id="nombre" placeholder="Escribe tu nombre de pila">
    </p>
    <p class="flex flex-row">
      <label class="text-right pr-8 flex-1" for="apellidos">Apellido(s):</label>
      <input class="flex-2" type="text" id="apellidos" placeholder="Indica tu(s) apellido(s)">
    </p>
    <fieldset class="border-1 border-pink-800 pr-4 mb-4">
      <legend class="bg-pink-800 text-white my-2 px-3">Gastos fijos</legend>
      <p class="flex flex-row">
        <label class="text-right pr-8 flex-1" for="internet">Internet:</label>
        <input class="flex-2" type="number" id="internet" value="43">
      </p>
      <p class="flex flex-row">
        <label class="text-right pr-8 flex-1" for="luz">Luz: </label>
        <input class="flex-2" type="number" id="luz">
      </p>
      <p class="flex flex-row">
        <label class="text-right pr-8 flex-1" for="agua">Agua:</label>
        <input class="flex-2" type="number" id="agua">
      </p>
      <p class="flex flex-row">
        <label class="text-right pr-8 flex-1" for="gas">Gas: </label>
        <input class="flex-2" type="number" id="gas">
      </p>
      <p class="flex flex-row">
        <label class="text-right pr-8 flex-1" for="alquiler">Alquiler:</label>
        <input class="flex-2" type="number" id="alquiler">
      </p>
    </fieldset>
    <p class="flex flex-row">
      <button class="text-pink-800 font-bold bg-white outline-offset-2" type="button" onclick="calcular()">
         Calcular Gastos
      </button>
    </p>
    <p id="totalGastos" class="flex flex-row border-1 border-pink-800">&nbsp;</p>
  </form>
  <script src="app.js"></script>

</body>

</html>
