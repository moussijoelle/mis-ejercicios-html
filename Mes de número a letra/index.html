<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes de número a letra</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-stone-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-amber-900/90;
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-800 font-mono;
        }
        input,
        label {
          @apply inline-block max-sm:block max-sm:w-full sm:flex-1 sm:pl-4;
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }

        code {
          @apply text-blue-800;
        }
        ul {
          list-style-type: circle;
          @apply ml-4;
        }
      }
    </style>
  </head>

  <body class="bg-gradient-to-b from-yellow-500 to-green-500 px-3 py-3 sm:px-4 sm:py-4">
    <main
      class="min-h-[calc(100dvh-1.5rem)] w-full min-w-0 max-w-2xl mx-auto flex flex-col justify-start items-center px-3 pt-6 pb-6 overflow-x-hidden
      sm:px-6 sm:pt-10 md:px-8 sm:min-h-screen bg-white rounded-lg"
    >
      <h1
        class="max-w-prose w-full text-balance rounded-lg bg-blue-600 px-4 py-3 text-center text-xl font-bold text-white sm:text-2xl md:text-3xl"
      >
        🗓️ ¡<strong class="font-bold text-yellow-300">Reto calendario</strong>! Elige un número del 1 al 12 y descubre qué mes toca
      </h1>

      <p class="mt-8 max-w-prose text-center text-2xl text-yellow-700">
        Escribe un número del <strong>1</strong> al <strong>12</strong> y pulsa Mostrar.
      </p>

      <p class="mt-10 w-full max-w-md rounded-lg bg-blue-600 px-3 py-3 text-white sm:mt-12 sm:px-4">
        <label class="block font-medium text-white sm:mr-2 sm:inline" for="numeroMes">Mes (1–12):</label>
        <input
          class="mt-2 w-full max-w-[6rem] rounded-md border-2 border-white bg-white text-blue-900 outline-none focus:ring-2 focus:ring-yellow-300 sm:mt-0 sm:inline-block"
          type="number"
          id="numeroMes"
          name="numeroMes"
          min="1"
          max="12"
          step="1"
          inputmode="numeric"
        />
      </p>

      <button
        id="btnMostrar"
        type="button"
        class="mt-4 min-h-[44px] min-w-[8rem] touch-manipulation rounded-lg border-0 bg-blue-600 px-4 py-2 text-base font-semibold text-white hover:bg-blue-700"
      >
        Mostrar
      </button>

      <p
        id="mensaje"
        class="mt-4 min-h-[1.5rem] w-full max-w-lg px-2 text-center text-base font-medium text-blue-700 sm:text-lg"
        aria-live="polite"
      ></p>

      <div class="mt-auto flex w-full justify-center pt-8">
        <img
          src="img/tiempo.gif"
          alt="Ilustración animada al final de la página"
          class="h-auto w-full max-w-sm rounded-lg sm:max-w-md md:max-w-lg"
          loading="lazy"
        />
      </div>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
