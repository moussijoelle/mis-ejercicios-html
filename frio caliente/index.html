<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./img/robot.png" type="image/x-icon">
  <title>Frio/Tibio/Caliente</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

    @layer base {
      :root {
        @apply text-sm;
        line-height: 1.6;
      }
      
      main {
        @apply w-5/6 bg-cyan-50 mx-auto p-4 border-4 border-teal-400 shadow-lg rounded-xl
      }

      #resultado {
        @apply text-center text-lg font-semibold text-violet-900 min-h-[1.75rem]
      }

      h1 {
        @apply font-bold text-5xl mb-4
      }
      
      h2, h3, h4 {
        @apply font-bold text-center
      }
      p { @apply mb-2 }

      button {
        @apply rounded-lg bg-amber-500 border-2 border-amber-700 text-slate-900 font-semibold p-3 m-6 text-base cursor-pointer shadow-md hover:bg-amber-400 disabled:opacity-50
      }

      kbd, code, a {
        @apply text-blue-800
      }

      a {
        @apply border-b-1 
      }

      input {
        @apply border-2 border-teal-500 px-3 py-2 rounded-lg font-sans text-center text-lg text-slate-800 block mx-auto max-w-[12rem] focus:border-amber-500 focus:ring-2 focus:ring-amber-300 focus:outline-none
      }

      label {
        @apply text-center block mx-auto my-2 text-teal-900 font-semibold text-base
      }

      hr {
        @apply my-3
      }


    }   
</style>

</head>

<body>
  
    <div class="grid grid-cols-[1fr] grid-rows-[100px_1fr_100px] gap-y-[10px] min-h-screen p-20 bg-transparent">

        <div class="bg-slate-800 text-white flex items-center justify-center border border-slate-700 rounded-lg">
            <header>
                <p class="text-center text-white text-2xl leading-snug">
                    Este juego consiste en adivinar un
                    <span class="text-sky-300 font-semibold">número entero aleatorio</span>
                    entre
                    <span class="text-amber-300 font-bold">1</span>
                    y
                    <span class="text-amber-300 font-bold">500</span>.
                </p>
            </header>
        </div>

        <div class="bg-slate-800 text-black flex items-center justify-center border border-slate-700 rounded-lg">

            <main>
                <h1 class="text-center tracking-tight">
                    <span class="text-sky-400 drop-shadow-sm">Frío</span><span class="text-slate-500"> / </span><span class="text-amber-400 drop-shadow-sm">Tibio</span><span class="text-slate-500"> / </span><span class="text-red-500 drop-shadow-sm">Caliente</span>
                </h1>

                <form novalidate onsubmit="revisar(event)">
                    <p>
                        <label for="numero">Escribe un número entre 1 y 499:</label>
                        <input id="numero" type="number" min="1" max="500" required>
                    </p>
                    <p class="text-center" id="bot">
                        <button id="boton" type="submit">❓Adivinar</button>
                    </p>
                </form>

                <p id="resultado"></p>
            </main>

        </div>

        <div class="bg-slate-800 text-slate-300 flex items-center justify-center border border-slate-600 rounded-lg text-sm">
            <span class="text-teal-400 font-medium">Frío</span>
            <span class="mx-2 text-slate-500">·</span>
            <span class="text-amber-400 font-medium">Tibio</span>
            <span class="mx-2 text-slate-500">·</span>
            <span class="text-rose-400 font-medium">Caliente</span>
        </div>

    </div>
    


<script src="./js/app.js"></script>


</body>

</html>
