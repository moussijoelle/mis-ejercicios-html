<!DOCTYPE html>
<html lang="es" data-theme="aqua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial Aqua Style v5</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.6/daisyui.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.6/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inclusive Sans', sans-serif;
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.55), rgba(15, 23, 42, 0.55)),
                url('img/cccircular (2).svg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="flex min-h-screen flex-col pb-8 text-base-content">

    <header class="w-full py-8 text-center shadow-2xl backdrop-blur-sm">
        <h1 class="text-4xl font-black uppercase tracking-tighter text-primary">El factorial de un número</h1>
    </header>

    <main class="flex flex-grow items-center justify-center p-4">

        <div class="card w-full max-w-sm border-2 border-primary bg-base-100/95 shadow-2xl backdrop-blur-md">
            <div class="card-body gap-6">

                <div class="form-control">
                    <input type="number" id="numero" placeholder="Escribe aquí..."
                           class="input input-bordered input-secondary bg-base-200 text-center text-3xl font-bold" />
                </div>

                <button type="button" id="btnCalcular" class="btn btn-primary btn-lg shadow-lg">
                    Calcular Ahora 🚀
                </button>

                <div id="aviso" class="hidden"></div>

                <div id="resultado" class="flex min-h-[100px] items-center justify-center">
                    <p class="text-center text-sm italic opacity-60">
                        Introduce un número positivo o negativo
                    </p>
                </div>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
