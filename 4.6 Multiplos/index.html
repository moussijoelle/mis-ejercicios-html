<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detector de múltiplos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-gray-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-slate-500;
        }
        input {
          @apply rounded-sm border-1 border-blue-800 text-black font-mono;
        }

        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }
        details {
          @apply mb-4 pb-4 border-b-slate-700 border-b-1;
        }
        summary {
          @apply bg-slate-700 text-white font-bold;
        }
        code {
          @apply text-blue-800;
        }
        ul {
          list-style-type: circle;
          @apply ml-4;
        }
      }
    </style>
  </head>

  <body>
    <main
      class="container mx-auto flex flex-col items-center gap-12 p-6 border-4 border-blue-800 min-h-screen bg-black"
    >
      <h1 class="text-6xl font-bold text-white text-center mb-10">
        Pruébalo ahora 🥳
      </h1>
      <p class="max-w-2xl text-center text-white/80 text-2xl">
        Escribe un dividendo y un divisor (del 2 al 7) y descubre si el dividendo es múltiplo del divisor.
      </p>

      <div
        class="mx-auto flex w-full max-w-2xl flex-col gap-4 border-4 border-white p-4"
      >
        <div class="grid grid-cols-[auto_auto] items-center gap-x-4 gap-y-4">
          <label class="text-white text-xl bg-blue-800 p-2 rounded-md" for="dividendo">Escribe el dividendo</label>
          <input
            id="dividendo"
            class="w-48 text-center border-white bg-blue-800 p-2 rounded-md text-white"
            type="number"
            step="1"
            inputmode="numeric"
            autocomplete="off"
          />

          <label class="text-white text-xl bg-blue-800 p-2 rounded-md" for="divisor">Escribe el divisor</label>
          <input
            id="divisor"
            class="w-48 text-center border-white bg-blue-800 p-2 rounded-md text-white"
            type="number"
            step="1"
            min="2"
            max="7"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>
        <button
          type="button"
          id="btnProbarAhora"
          class="self-start border-4 border-yellow-500 bg-blue-800 p-2 rounded-md text-white"
        >
          Probar ahora
        </button>
        <p id="resultado" class="self-start text-left mt-4 text-white"></p>
      </div>
      <img
        src="img/matematica.gif"
        alt="fun"
        class="mt-6 w-full max-w-sm self-center"
      />
    </main>
    <script src="app.js"></script>
  </body>
</html>
