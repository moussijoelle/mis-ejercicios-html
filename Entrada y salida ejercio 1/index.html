<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
    </script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p, h1, h2, h3 {
          @apply mb-2 leading-relaxed text-gray-700
        }
        h1, h2, h3 {
          @apply mt-2 font-bold text-slate-500
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-400 font-mono
        }
        input, label {
          @apply inline-block flex-1 pl-4
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1
        }
        details {
          @apply mb-4 pb-4 border-b-slate-700 border-b-1
        }
        summary {
          @apply bg-slate-700 text-white font-bold
        }
        code {
          @apply text-blue-800
        }
        ul {
          list-style-type: circle;
          @apply ml-4
        }
      }
    </style>
    <title>Aritmética con dos números</title>
  </head>
  <body class="container w-4/5 mx-auto">
    <h1>Aritmética con dos números</h1>
    <p>Introduce dos enteros y pulsa <strong>Aritmética</strong> para ver suma, resta, multiplicación y división.</p>

    <h2>Formulario</h2>
      <div class="w-2/3">
        <p class="flex">
          <label class="flex-1" for="numeroa">Escribe un número entero</label>
          <input class="flex-1" type="number" id="numeroa">
        </p>
        <p class="flex">
          <label class="flex-1" for="numerob">Escribe otro número entero</label>
          <input class="flex-1" type="number" id="numerob">
        </p>
        <p><button type="button" onclick="calcular()">Aritmética</button></p>
         <p id="suma"></p>
         <p id="resta"></p>
         <p id="multiplicacion"></p>
         <p id="division"></p>

      </div>
    <script src="app.js"></script>
  </body>
</html>
