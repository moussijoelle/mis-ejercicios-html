<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-gray-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-slate-500;
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-400 font-mono;
        }
        input,
        label {
          @apply inline-block flex-1 pl-4;
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }
        details {
          @apply mb-4 pb-4 border-b-slate-700 border-b-1;
        }
        summary {
          @apply bg-slate-700 text-white font-bold;
        }
        code {
          @apply text-blue-800;
        }
        ul {
          list-style-type: circle;
          @apply ml-4;
        }
      }
    </style>

    <title>Ejercicios de javascript</title>
  </head>

  <body class="container w-4/5 mx-auto">
<details> 
    <summary>Ejercicio 2</summary>
    <p>Haz un programa que le pida al usuario que introduzca 3 notas por formulario y que muestre como resultado el promedio de las 3 notas por pantalla. Usa la función <code>parseFloat</code> para convertir a número.</p>
  <h2>Formulario</h2>
  <div class="w-2/3">
    <form id="form-notas">
      <p class="flex">
        <label class="flex-1" for="nota1">Nota 1</label>
        <input class="flex-1" id="nota1" type="number" step="0.01" required />
      </p>
      <p class="flex">
        <label class="flex-1" for="nota2">Nota 2</label>
        <input class="flex-1" id="nota2" type="number" step="0.01" required />
      </p>
      <p class="flex">
        <label class="flex-1" for="nota3">Nota 3</label>
        <input class="flex-1" id="nota3" type="number" step="0.01" required />
      </p>
      <p><button type="submit">Calcular promedio</button></p>
    </form>
    <p id="resultado"></p>
  </div>
</details>

<script src="app.js"></script>





    
  </body>
</html>
