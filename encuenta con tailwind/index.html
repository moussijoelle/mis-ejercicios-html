<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos de la casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-burgundy: #901040;
    }
  </style>
</head>

<body class="font-sans antialiased bg-gray-100 min-h-dvh py-10 px-4 text-slate-800">
  <main class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-burgundy mb-1">Gastos de la casa</h1>
    <p class="text-sm font-bold text-slate-800 mb-8 max-w-xl leading-snug">
      Ojo: lo que escribes en las cajas lo lee el navegador como texto; para sumar hace falta pasarlo a número.
    </p>

    <form id="gastos-form" class="space-y-6" novalidate>
      <div class="space-y-3">
        <div class="grid grid-cols-[7.5rem_1fr] gap-x-3 gap-y-3 items-center sm:grid-cols-[8.5rem_1fr]">
          <label for="nombre" class="text-right text-sm font-medium">Tu nombre:</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre"
            class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-slate-800
              shadow-[inset_0_0_0_1px_rgba(0,0,0,0.02)]
              placeholder:text-rose-300 focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />

          <label for="apellidos" class="text-right text-sm font-medium">Apellido(s):</label>
          <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos"
            class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-slate-800
              shadow-[inset_0_0_0_1px_rgba(0,0,0,0.02)]
              placeholder:text-rose-300 focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />
        </div>
      </div>

      <div class="relative border-2 border-burgundy rounded-sm bg-white/0 px-4 pb-4 pt-7 sm:px-5">
        <div
          class="absolute -top-3 left-4 z-10 bg-burgundy px-3 py-0.5 text-sm font-bold text-white shadow-sm">
          Gastos fijos
        </div>
        <div class="space-y-3">
          <div class="grid grid-cols-[6.5rem_1fr] items-center gap-x-3 sm:grid-cols-[7.5rem_1fr]">
            <label for="internet" class="text-right text-sm font-medium">Internet:</label>
            <input type="text" inputmode="decimal" id="internet" name="internet" value="43"
              class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-sm text-burgundy
                focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />
          </div>
          <div class="grid grid-cols-[6.5rem_1fr] items-center gap-x-3 sm:grid-cols-[7.5rem_1fr]">
            <label for="luz" class="text-right text-sm font-medium">Luz:</label>
            <input type="text" inputmode="decimal" id="luz" name="luz"
              class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-sm text-burgundy
                focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />
          </div>
          <div class="grid grid-cols-[6.5rem_1fr] items-center gap-x-3 sm:grid-cols-[7.5rem_1fr]">
            <label for="agua" class="text-right text-sm font-medium">Agua:</label>
            <input type="text" inputmode="decimal" id="agua" name="agua"
              class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-sm text-burgundy
                focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />
          </div>
          <div class="grid grid-cols-[6.5rem_1fr] items-center gap-x-3 sm:grid-cols-[7.5rem_1fr]">
            <label for="gas" class="text-right text-sm font-medium">Gas:</label>
            <input type="text" inputmode="decimal" id="gas" name="gas"
              class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-sm text-burgundy
                focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />
          </div>
          <div class="grid grid-cols-[6.5rem_1fr] items-center gap-x-3 sm:grid-cols-[7.5rem_1fr]">
            <label for="alquiler" class="text-right text-sm font-medium">Alquiler:</label>
            <input type="text" inputmode="decimal" id="alquiler" name="alquiler"
              class="w-full min-w-0 rounded-md border border-gray-400 bg-white px-3 py-2 text-sm text-burgundy
                focus:border-burgundy focus:outline-none focus:ring-1 focus:ring-burgundy" />
          </div>
        </div>
      </div>

      <div class="pt-1">
        <button type="button" id="btn-calcular"
          class="rounded-md border-2 border-burgundy bg-white px-4 py-2 text-sm font-semibold text-burgundy
            shadow-sm transition hover:bg-rose-50 focus:outline-none focus:ring-2 focus:ring-burgundy focus:ring-offset-2">
          Calcular Gastos
        </button>
      </div>
    </form>

    <div id="resultado" role="status" aria-live="polite" class="mt-4 min-h-[3.5rem] rounded-sm border-2 border-burgundy bg-white p-3 text-sm text-burgundy"></div>
  </main>

  <script>
    const ids = ["internet", "luz", "agua", "gas", "alquiler"];
    const labels = { internet: "Internet", luz: "Luz", agua: "Agua", gas: "Gas", alquiler: "Alquiler" };

    function aNumero(valor) {
      const n = parseFloat(String(valor).replace(",", ".").trim());
      return Number.isFinite(n) ? n : 0;
    }

    document.getElementById("btn-calcular").addEventListener("click", () => {
      const out = document.getElementById("resultado");
      const lineas = [];
      let total = 0;
      for (const id of ids) {
        const el = document.getElementById(id);
        const raw = el.value; // en un input de texto, .value siempre es una cadena
        const num = aNumero(raw);
        total += num;
        lineas.push(`<div class="flex justify-between gap-4 border-b border-rose-100/80 py-0.5 last:border-0"><span>${labels[id]}</span><span class="font-medium tabular-nums">${num.toFixed(2)}</span></div>`);
      }
      out.innerHTML = `
        <p class="mb-2 text-xs text-slate-600">Convierto lo que pusiste en cada caja a número (coma o punto) y luego sumo.</p>
        <div class="mb-2 space-y-0 text-burgundy">${lineas.join("")}</div>
        <p class="text-base font-bold text-burgundy">Total: <span class="tabular-nums">${total.toFixed(2)}</span> €</p>
      `;
    });
  </script>
</body>
</html>
