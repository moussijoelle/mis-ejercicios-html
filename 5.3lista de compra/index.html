<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

    @layer base {
      :root {
        @apply text-sm;
        line-height: 1.6;
      }

      p {
        @apply mb-2
      }

      button {
        @apply rounded-md bg-slate-200 border-1 border-slate-400 px-4 py-1 my-1 text-sm cursor-pointer disabled:opacity-50
      }
      details {
        @apply mb-4 py-2 border-b-slate-700 border-b-1 text-slate-800 italic 
      }
      summary {
        @apply py-1 text-base bg-slate-800 text-white
      }

      ol {
        @apply list-decimal list-outside ml-6 mb-4
      }
      
      kbd, code, a {
        @apply text-blue-800
      }

      a {
        @apply border-b-1 
      }

      input {
        @apply border-1 px-2
      }

      hr {
        @apply my-3
      }
    }
  </style>

  <link rel="shortcut icon" href="shopping-cart.svg" type="image/svg"> 
  <title>🍅 Compras</title>
</head>

<body class="container w-5/6 m-auto pt-10 bg-gradient-to-r from-blue-100 from-30 % to-white-100 ">
  <h1 class="font-bold text-4xl mb-8">😊 Bienvenido a Compra Sin Drama 👉 Aquí tienes tu lista de compra.🛒</h1>
  
  <div class="flex items-center justify-start gap-2 mb-4 w-full mt-24 ">
    <label class="shrink-0" for="producto-input">Producto que deseas agregar:</label>
    <input class="flex-1 max-w-lg " type="text" id="producto-input" placeholder="Ejemplo: Pan">
    <button class="shrink-0 bg-blue-500 text-white px-4 py-2 rounded-md" onclick="agregar()">Agregar</button>
    <label class="shrink-0 ml-2" for="posicion-input">Posición:</label>
    <input class="shrink-0 w-20" id="posicion-input" type="number" min="0" placeholder="0">
    <button class="shrink-0 bg-yellow-500 text-black" onclick="eliminarPorPosicion()">Eliminar por posición</button>
    <button class="shrink-0 bg-red-500 text-white" onclick="vaciarCarrito()">Vaciar carrito</button> 
    
  </div>
  <div class="flex">
    <div class="flex-2 border-1">  
      <ol start="0" id="lista-compras"></ol>
    </div>
    <div class="flex-2 text-center bg-white">
      <img class="inline w-2/3" src="img/compra.webp" alt="carrito">
      <p>
        Número de productos en el carrito: 
        <span class="font-bold text-red-700" id="num-prod">0</span>
      </p>
      
    </div>
  </div>
  <!-- Espacio para mensajes -->
  <p class="italic" id="mensaje">&nbsp;</p>
  
  <script src="app.js"></script>
  
</body>

</html>
