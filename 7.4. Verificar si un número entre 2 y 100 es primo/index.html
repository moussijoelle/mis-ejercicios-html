<!DOCTYPE html>
<html lang="es" data-theme="coffee">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar si un número entre 2 y 100 es primo</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.6/daisyui.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.6/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&display=swap" rel="stylesheet">
</head>
<body class="relative flex min-h-screen flex-col pb-8 font-[Inclusive_Sans,sans-serif] text-base-content/75">

    <img
        src="img/bg.svg"
        alt=" background image"
        class="pointer-events-none fixed inset-0 -z-10 h-full w-full object-cover object-top"
        aria-hidden="true"
    />

    <main class="relative flex flex-grow flex-col items-center p-6 pt-12 md:pt-16">

        <h1 class="mb-10 w-full max-w-6xl rounded-2xl bg-base-100 px-8 py-4 text-center text-sm font-medium text-base-content/75 shadow-md sm:whitespace-nowrap sm:text-base md:mb-12 md:text-lg">
            Introduce un número entero mayor o igual a 2 y menor a 100
        </h1>

        <section class="flex w-full flex-grow items-center justify-center">

            <div class="card w-full max-w-sm border border-base-300 bg-base-100 shadow-lg">
                <form id="formPrimo" class="card-body gap-6">

                    <div class="form-control">
                        <label class="mb-2 block text-sm font-medium text-base-content/75" for="numero">
                            Introduce un número
                        </label>
                        <input
                            type="number"
                            id="numero"
                            name="numero"
                            min="2"
                            max="99"
                            step="1"
                            required
                            placeholder="Ej 2"
                            class="input input-bordered input-primary w-full bg-base-200 text-center text-3xl font-semibold"
                        />
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Verificar
                    </button>

                    <div id="resultado" class="flex min-h-[100px] items-center justify-center"></div>
                </form>
            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
