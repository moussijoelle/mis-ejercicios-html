<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa del Top 20 de mis Animes Japoneses Preferidos</title>

  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.19/daisyui.css" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.19/themes.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Urbanist', sans-serif; }

    #titulo-principal {
      color: #1f2937;
    }

    [data-theme="night"] #titulo-principal {
      color: #38bdf8;
    }

    #carousel-intro.slide-info #intro-subtitulo {
      color: #00b300;
    }

    [data-theme="night"] #carousel-intro.slide-info #intro-subtitulo {
      color: #38bdf8;
    }

  </style>
</head>

<body class="bg-base-300 min-h-screen grid grid-cols-1 place-items-center p-4 transition-colors duration-300">

  <div class="relative w-full max-w-6xl">

  <aside
    id="panel-reloj"
    class="mb-3 flex justify-center lg:mb-0 lg:absolute lg:right-full lg:top-6 lg:mr-3"
  >
    <div
      id="reloj"
      class="w-[7.5rem] rounded-lg bg-black px-2 py-2 text-center font-mono text-lg tracking-wide text-slate-100 shadow-md"
      aria-live="polite"
    >00:00:00</div>
  </aside>

  <div id="main-card" class="card w-full max-w-6xl bg-base-100 shadow-2xl border border-base-300 p-4 sm:p-5 rounded-2xl">

    <header id="page-header" class="mb-2 flex flex-wrap items-center justify-between gap-3 border-b border-base-200 pb-2">
      <div class="flex min-w-0 flex-1 items-center justify-center gap-3 md:gap-4">
        <img
          id="logo-header"
          src="img/apple-touch-icon.webp"
          alt="Logo del carrusel de animes"
          class="h-16 w-16 shrink-0 object-contain md:h-20 md:w-20 lg:h-24 lg:w-24"
          width="96"
          height="96"
        />
        <h1 id="titulo-principal" class="min-w-0 text-center text-2xl font-extrabold tracking-wide md:text-3xl">
          Mapa del top 20 de mis animes japoneses preferidos
        </h1>
        <button
          id="btn-play-pause"
          type="button"
          class="btn btn-circle btn-success btn-sm shrink-0 text-white"
          title="Reproducción automática"
          aria-label="Reproducción automática"
        >▶</button>
      </div>

      <label class="swap swap-rotate btn btn-ghost btn-circle btn-lg size-16 shrink-0 p-0" title="Cambiar entre light y night">
        <input type="checkbox" class="theme-controller" value="night" id="theme-toggle" aria-label="Tema light o night" />
        <svg class="swap-off size-10 fill-current text-amber-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.36Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41l-.71.71a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/>
        </svg>
        <svg class="swap-on size-10 fill-current text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/>
        </svg>
      </label>
    </header>

    <section id="carousel-slide" class="flex flex-col">
    <figure id="carousel-figure" class="relative flex w-full min-h-[50vh] items-center justify-center rounded-xl border border-base-200 bg-base-200 px-2 py-1 shadow-inner md:min-h-[min(62vh,560px)]">
      <div
        id="carousel-intro"
        class="flex min-h-full w-full flex-col items-center justify-center gap-4 px-4 py-4 text-center"
      >
        <h2 id="intro-titulo" class="sr-only text-xl font-extrabold text-base-content md:text-2xl"></h2>
        <p id="intro-subtitulo" class="max-w-2xl text-base leading-relaxed text-base-content/80 sm:text-lg md:text-xl"></p>
        <p id="intro-extra" class="hidden max-w-2xl text-base leading-relaxed text-base-content/75 sm:text-lg"></p>
        <p id="intro-fuente" class="hidden max-w-2xl"></p>
        <p id="intro-hint" class="text-sm text-base-content/50">Pulsa › para comenzar el recorrido</p>
      </div>

      <img
        id="carousel-img"
        class="relative z-0 mx-auto hidden h-auto w-full max-w-full object-contain object-center"
        src=""
        alt="Portada del anime"
      />

      <div class="absolute inset-y-0 left-2 right-2 z-20 sm:left-4 sm:right-4 flex items-center justify-between pointer-events-none">
        <div class="flex gap-2 pointer-events-auto">
          <button id="btn-first" type="button" class="btn btn-circle btn-sm btn-neutral opacity-80 hover:opacity-100" aria-label="Primero">«</button>
          <button id="btn-prev" type="button" class="btn btn-circle btn-sm btn-neutral opacity-80 hover:opacity-100" aria-label="Anterior">‹</button>
        </div>
        <div class="flex gap-2 pointer-events-auto">
          <button id="btn-next" type="button" class="btn btn-circle btn-sm btn-neutral opacity-80 hover:opacity-100" aria-label="Siguiente">›</button>
          <button id="btn-last" type="button" class="btn btn-circle btn-sm btn-neutral opacity-80 hover:opacity-100" aria-label="Último">»</button>
        </div>
      </div>
    </figure>

    <article id="anime-info" class="mt-1 space-y-1">
      <span id="anime-puesto" class="badge badge-primary badge-sm font-bold"></span>
      <h2 id="anime-nombre" class="text-xl md:text-2xl font-extrabold text-base-content tracking-tight leading-tight"></h2>
      <p id="anime-descripcion" class="text-sm md:text-base text-base-content/75 leading-snug !mb-0"></p>
      <ul id="anime-caracteristicas" class="list-disc list-inside space-y-0.5 pt-1 border-t border-base-200 text-sm text-base-content/85 !mt-0.5"></ul>
    </article>
    </section>

  </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
