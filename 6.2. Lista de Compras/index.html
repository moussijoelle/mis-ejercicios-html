<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

    @layer base {
      :root {
        @apply text-sm;
        line-height: 1.6;
      }

      p {
        @apply mb-2
      }

      button {
        @apply rounded-md bg-slate-200 border-1 border-slate-400 px-4 py-1 my-1 text-sm cursor-pointer disabled:opacity-50
      }
      details {
        @apply mb-4 py-2 border-b-slate-700 border-b-1 text-slate-800 italic 
      }
      summary {
        @apply py-1 text-base bg-slate-800 text-white
      }

      ol {
        @apply list-decimal list-outside ml-6 mb-4
      }
      
      kbd, code, a {
        @apply text-blue-800
      }

      a {
        @apply border-b-1 
      }

      input {
        @apply border-1 px-2
      }

      hr {
        @apply my-3
      }
    }
  </style>

  <link rel="shortcut icon" href="shopping-cart.svg" type="image/svg"> 
  <title>  6.2. Lista de Compras  </title>
</head>

<body class="container mx-auto w-full px-4 pt-10 md:w-5/6 md:px-0 bg-gradient-to-r from-blue-100 from-30% to-white-100">
  <h1 class="font-bold text-2xl sm:text-3xl md:text-4xl mb-8">😊 Bienvenido a Compra Sin Drama 👉 Aquí tienes tu lista de compra.🛒</h1>
  
  <div class="flex flex-col items-stretch gap-2 mb-4 w-full mt-8 md:mt-24 md:flex-row md:items-center md:justify-start md:gap-2">
    <label class="md:shrink-0" for="producto-input">Producto que deseas agregar:</label>
    <input class="w-full min-w-0 md:flex-1 md:max-w-lg" type="text" id="producto-input" placeholder="Ejemplo: Pan">
    <label class="md:shrink-0" for="precio-input">Precio (€):</label>
    <input class="w-full min-w-0 md:w-28 md:shrink-0" type="number" id="precio-input" min="0" step="0.01" placeholder="0.00">
    <button class="w-full md:w-auto md:shrink-0 bg-blue-500 text-white px-4 py-2 rounded-md" onclick="agregar()">Agregar</button>
    <label class="md:shrink-0 md:ml-2" for="posicion-input">Posición:</label>
    <input class="w-full md:w-20 md:shrink-0" id="posicion-input" type="number" min="0" placeholder="0">
    <button class="w-full md:w-auto md:shrink-0 bg-yellow-500 text-black" onclick="eliminarPorPosicion()">Eliminar por posición</button>
    <button class="w-full md:w-auto md:shrink-0 bg-red-500 text-white" onclick="vaciarCarrito()">Vaciar carrito</button>
    <button class="w-full md:w-auto md:shrink-0 bg-green-500 text-black" onclick="totalCompras()">Total Compras</button>
    
  </div>
  <div class="flex flex-col gap-6 md:flex-row md:gap-0">
    <div class="min-w-0 flex-1 border-1">
      <ul id="lista-compras"></ul>
    </div>
    <div class="min-w-0 flex-1 text-center bg-white">
      <img class="mx-auto w-full max-w-xs md:inline md:w-2/3 md:max-w-none" src="img/compra.webp" alt="carrito">
      <p>
        Número de productos en el carrito: 
        <span class="font-bold text-red-700" id="num-prod">0</span>
      </p>
      
    </div>
  </div>
  <!-- Espacio para mensajes -->
  <p class="italic" id="mensaje">&nbsp;</p>
  
  <script src="app.js"></script>
  
</body>

</html>
