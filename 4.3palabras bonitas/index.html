<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palabras bonitas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-gray-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-slate-500;
        }
        input {
          @apply rounded-sm border-1 border-blue-800 text-black font-mono;
        }

        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }
        code {
          @apply text-blue-800;
        }
      }
    </style>
  </head>

  <body>
    <main
      class="container mx-auto flex flex-col items-center gap-12 p-6 border-4 border-blue-800 min-h-screen bg-pink-800"
    >
      <h1
        class="mb-10 text-center text-6xl font-bold text-white drop-shadow-[0_0_14px_rgba(255,255,255,0.95)]"
      >
        Proba el juego de las Palabras bonitas😁😍
      </h1>
      <div
        class="mx-auto flex w-full max-w-3xl flex-col gap-4 border-4 border-blue-800 bg-white p-4 sm:flex-row sm:items-start sm:gap-6"
      >
        <div class="flex min-w-0 flex-1 flex-col gap-4">
          <div class="flex flex-row items-center gap-4 flex-wrap">
            <label class="shrink-0" for="palabra">Escribe una palabra</label>
            <input
              id="palabra"
              class="min-w-0 max-w-xs flex-1 text-center"
              type="text"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <button
            type="button"
            id="btnEvaluar"
            class="self-start border-2 border-yellow-500"
          >
            Comprobar si es bonita
          </button>
          <p
            id="resultado"
            class="mt-4 max-w-prose self-start text-left text-sm text-amber-950"
          ></p>
        </div>
        <img
          src="img/primavera.webp"
          alt="primavera"
          class="h-auto w-auto max-w-24 max-h-24 shrink-0 self-center rounded-lg object-contain shadow-md sm:self-start sm:ml-auto"
        />
      </div>
      <div
        class="mt-6 flex w-full max-w-4xl flex-wrap items-center justify-center gap-6 self-center"
      >
        <img
          src="img/happiness.webp"
          alt="happy"
          class="h-auto w-auto max-w-80 max-h-80 rounded-lg object-contain shadow-md"
        />
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
