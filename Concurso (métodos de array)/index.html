<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concurso — clasificación</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-stone-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-amber-900/90;
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-800 font-mono;
        }
        input,
        label {
          @apply inline-block max-sm:block max-sm:w-full sm:flex-1 sm:pl-4;
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }

        code {
          @apply text-blue-800;
        }
        ul {
          list-style-type: circle;
          @apply ml-4;
        }
      }
    </style>
  </head>

  <body
    class="min-h-dvh bg-gradient-to-b from-slate-200 via-slate-400 to-slate-700 px-3 py-3 sm:px-4 sm:py-4"
  >
    <main
      class="min-h-[calc(100dvh-1.5rem)] w-full min-w-0 max-w-2xl mx-auto flex flex-col justify-start items-center px-3 pt-6 pb-6 overflow-x-hidden
      sm:px-6 sm:pt-10 md:px-8 sm:min-h-screen bg-white rounded-lg"
    >
      <h1
        class="max-w-prose w-full text-balance rounded-lg bg-blue-600 px-4 py-3 text-center text-xl font-bold text-white sm:text-2xl md:text-3xl"
      >
        Clasificación del <strong class="font-bold text-yellow-300">concurso</strong>
      </h1>

      <p class="mt-8 max-w-prose text-center text-lg text-stone-600 sm:text-xl">
        Orden actual (de primero a último):
      </p>

      <p
        id="clasificacionInicial"
        class="mt-4 w-full max-w-lg rounded-lg border-2 border-slate-200 bg-slate-50 px-4 py-3 text-center font-medium text-slate-800 sm:text-lg"
        aria-live="polite"
      ></p>

      <button
        id="btnConcursar"
        type="button"
        class="mt-6 min-h-[44px] min-w-[10rem] touch-manipulation rounded-lg border-0 bg-blue-600 px-4 py-2 text-base font-semibold text-white uppercase tracking-wide hover:bg-blue-700"
      >
        CONCURSAR
      </button>

      <section
        id="salida"
        class="mt-6 min-h-[4rem] w-full max-w-lg px-2 text-center sm:text-lg"
        aria-live="polite"
      ></section>

      <div class="mt-auto flex w-full justify-center pt-8">
        <img
          src="img/uff.gif"
          alt="Animación al final de la página"
          class="h-auto w-full max-w-sm rounded-lg sm:max-w-md md:max-w-lg"
          
        />
      </div>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
