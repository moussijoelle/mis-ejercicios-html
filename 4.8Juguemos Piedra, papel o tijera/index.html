<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Piedra, papel o tijera </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-gray-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-slate-500;
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-400 font-mono;
        }
        input,
        label {
          @apply inline-block max-sm:block max-sm:w-full sm:flex-1 sm:pl-4;
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }
      
        code {
          @apply text-blue-800;
        }
        ul {
          list-style-type: circle;
          @apply ml-4;
        }
      }
    </style>
  </head>

  <body class="bg-gradient-to-b from-green-500 to-purple-500 px-3 py-3 sm:px-4 sm:py-4">
    
    <div
      aria-hidden="true"
      class="hidden md:block fixed top-0 bottom-0 w-4 bg-red-600 z-50 pointer-events-none left-[max(1rem,calc(50%-21rem-0.25rem))]"
    ></div>
    <div
      aria-hidden="true"
      class="hidden md:block fixed top-0 bottom-0 w-4 bg-red-600 z-50 pointer-events-none right-[max(1rem,calc(50%-21rem-0.25rem))]"
    ></div>
    <main
      class="min-h-[calc(100dvh-1.5rem)] w-full min-w-0 max-w-2xl mx-auto flex flex-col justify-start items-center px-3 pt-6 pb-6 overflow-x-hidden
      sm:px-6 sm:pt-10 md:px-8 sm:min-h-screen bg-white rounded-lg"
    >

    <img
        src="img/yes.gif"
        alt="Ilustración al principio de la página"
        class="mt-0 w-full max-w-full self-center rounded-md"
      />
      
      <h1
        class="text-center text-balance px-1 text-xl font-bold text-red-600 sm:text-2xl md:text-3xl max-w-prose"
      >
        Juguemos a piedra,papel o tijera  <strong class="font-bold text-green-600">"SUERTE"</strong>🍀
      </h1>
        
      <p class="mt-8 flex flex-wrap justify-center items-baseline gap-x-6 gap-y-3 text-center text-lg sm:gap-x-8">
          <span><strong class="text-maroon-600 text-4xl">1-👊 Piedra</strong></span>
          <span><strong class="text-maroon-600">2-✋ Papel</strong></span>
          <span><strong class="text-maroon-600 text-4xl">3-✌Tijera</strong></span>
        </p>
        
        <p class="mt-10 sm:mt-16 w-full max-w-md bg-gray-200 px-3 py-3 sm:px-4 rounded-md">
            <label class="block sm:inline sm:mr-2" for="eleccion">Tu elección (1-3):</label>
            <input class="mt-2 w-full max-w-[6rem] sm:mt-0 sm:inline-block" type="number" id="eleccion" name="eleccion" min="1" max="3" step="1" inputmode="numeric" />
          </p>
          
          <button
            id="btn-jugar"
            type="button"
            class="mt-4 min-h-[44px] min-w-[8rem] rounded-md border-2 border-amber-400 bg-gray-200 px-4 py-2 text-black text-base touch-manipulation"
          >
            Jugar
          </button>
          
          <p id="mensaje" class="mt-4 min-h-[1.5rem] w-full max-w-lg px-2 text-center text-base font-medium sm:text-lg" aria-live="polite"></p>


      <div class="mt-auto self-stretch -mx-3 sm:-mx-6 md:-mx-8 flex justify-center">

      <img
        src="img/last.gif"
        alt="Ilustración al final de la página"
        class="block h-auto w-full max-w-xs sm:max-w-sm md:max-w-md"
      />
    </div>
    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
